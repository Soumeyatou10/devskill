 <div 
      (click)="onClick()"
      class="bg-white border-2 rounded-xl p-3 cursor-pointer transition-all hover:border-teal-500"
      [class.border-teal-500]="isSelected()"
      [class.bg-teal-50]="isSelected()"
    >
      <div class="font-bold text-navy-800 text-sm mb-0.5">{{ skill().name }}</div>
      <div class="text-xs text-[#5a5a5a] mb-2">{{ skill().category }}</div>
      
      <span class="inline-block px-2 py-0.5 rounded-full text-[10px] font-bold uppercase" [class]="levelClass()">
        {{ skill().level }}
      </span>
      
      <app-progress-bar 
        [percentage]="skill().xp" 
        [color]="barColor()"
        [height]="4"
        [animated]="false"
        class="mt-2"
      />
      
      <div class="text-[10px] text-[#5a5a5a] text-right mt-1">{{ skill().xp }} XP</div>
    </div>
